seed: 42
model_name_or_path: google/gemma-4-e2b-it
tokenizer_name_or_path: google/gemma-4-e2b-it

train_jsonl: finetune/data/curriculum/stage_b_refiner_train.jsonl
val_jsonl: finetune/data/curriculum/stage_b_refiner_val.jsonl
output_dir: finetune/output/stage_b_refiner_qlora

enable_contract_filter: true
contract_failure_log: output/quality/stage_b_contract_failures.json

max_seq_length: 2048
learning_rate: 1.6e-4
num_train_epochs: 2
max_steps: -1
warmup_ratio: 0.03
weight_decay: 0.0

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
gradient_checkpointing: true

logging_steps: 10
eval_steps: 50
save_steps: 50
save_total_limit: 3
evaluation_strategy: steps
save_strategy: steps
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false

use_bf16: true
use_fp16: false
use_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: bfloat16
bnb_4bit_use_double_quant: true

lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

use_flash_attention_2: false
resume_from_checkpoint: null
