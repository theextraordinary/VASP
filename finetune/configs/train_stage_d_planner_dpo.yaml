base_model: google/gemma-4-e2b-it
sft_adapter_path: finetune/output/stage_a_planner_qlora

train_jsonl: finetune/data/hardneg/planner_dpo_train.jsonl
val_jsonl: finetune/data/hardneg/planner_dpo_val.jsonl
output_dir: finetune/output/stage_d_planner_dpo

use_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
bnb_4bit_compute_dtype: bfloat16
dtype: bfloat16

learning_rate: 5.0e-6
num_train_epochs: 1
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
evaluation_strategy: steps
save_strategy: steps
logging_steps: 10
eval_steps: 50
save_steps: 50
save_total_limit: 2
bf16: true
fp16: false

beta: 0.1
max_length: 2048
max_prompt_length: 1536
